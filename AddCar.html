<!DOCTYPE html>
<html>
    <head>
        <title>Addcar - CarNext</title>
        <style>
            .logo-img {
                position: absolute;
                top: 5px;
                left: 50px;
                width: 140px;
                height: auto;
            }

            .links {
                background-color: gray;
                text-align: right;
                padding: 20px 0;
                margin-top: 10px;
            }

            .links a {
                display: inline-block;
                color: white;
                font-size: 30px;
                margin: 0 50px;
                padding: 20px 50px;
                text-decoration: none;
            }

            .links a:hover {
                background-color: darkgray;
                color: black;
            }

            .links a.active {
                background-color: darkgray;
                color: black;
            }
            
            .publish-container {
                background: #f8f9fa;
                padding: 70px 20px;
            }
            .publish-box {
                max-width: 700px;
                margin: 0 auto;
                background: white;
                padding: 30px;
                border-radius: 8px;
                box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            }
            .publish-box h2 {
                border-bottom: 2px solid;
                padding-bottom: 10px;
                margin-bottom: 20px;
            }
            .form-group {
                margin-bottom: 15px;
            }
            .form-group label {
                display: block;
                margin-bottom: 5px;
                font-weight: bold;
            }
            .form-group input,
            .form-group select {
                width: 100%;
                padding: 10px;
                border: 1px solid #ddd;
                border-radius: 4px;
                box-sizing: border-box;
            }
            .btn-submit {
                background-color: #28a745;
                color: white;
                padding: 12px 30px;
                border: none;
                border-radius: 4px;
                cursor: pointer;
                width: 100%;
                font-size: 16px;
            }
            .btn-submit:hover {
                background-color: #218838;
            }

            .footer {
                background-color: dimgray;
                color: white;
                text-align: center;
                padding: 20px;
            }
        </style>
    </head>
    <body>
        <img src="https://github.com/Lttt558/QHE4103-Coursework-Delivery-1/blob/feature-homepage/LOGO.jpg?raw=true" class="logo-img">
        
        <nav>
            <div class="logo"></div>
            <div class="links">
                <a href="Home.html">HOME</a>
                <a href="Search.html">SEARCH</a>
                <a href="AddCar.html">SELL</a>
                <a href="Login.html">LOGIN</a>
                <a href="Register.html">REGISTER</a>
            </div>
        </nav>

        <div class="publish-container">
            <div class="publish-box">
                <h2>Publish New Car</h2>

                <div class="form-group">
                    <label>Car Model</label>
                    <input type="text" placeholder="e.g. Toyota GR 86, Ford Mustang">
                </div>

                <div class="form-group">
                    <label>Color</label>
                    <input type="text" placeholder="e.g. White, Black">
                </div>

                <div class="form-group">
                    <label>Year</label>
                    <input type="text" placeholder="e.g. 2020">
                </div>

                <div class="form-group">
                    <label>Location</label>
                    <input type="text" placeholder="e.g. Beijing, Shanghai">
                </div>

                <div class="form-group">
                    <label>Price (RMB)</label>
                    <input type="text" placeholder="e.g. 258,000">
                </div>

                <div class="form-group">
                    <label>Car Image</label>
                    <input type="file" accept="image/*">
                </div>

                <button class="btn-submit">Submit Car Information</button>
            </div>
        </div>

        <div class="footer">
            © 2026 CarNext Car Trading System | All Rights Reserved
        </div>
    </body>
</html>
