<!DOCTYPE html>
<html>
    <head>
        <title>Register - CarNext</title>
        <style>
            .logo-img {
                position: absolute;
                top: 5px;
                left: 50px;
                width: 140px;
                height: auto;
            }

            .links {
                background-color: gray;
                text-align: right;
                padding: 20px 0;
                margin-top: 10px;
            }

            .links a {
                display: inline-block;
                color: white;
                font-size: 30px;
                margin: 0 50px;
                padding: 20px 50px;
                text-decoration: none;
            }

            .links a:hover {
                background-color: darkgray;
                color: black;
            }

            .links a.active {
                background-color: darkgray;
                color: black;
            }

            .register-container {
                background: #f0f0f0;
                padding: 80px 0;
            }
            .register-box {
                background: white;
                border: 1px solid #aaa;
                max-width: 550px;
                margin: 0 auto;
                padding: 20px 25px;
            }
            .register-box h2 {
                margin-top: 5px;
            }
            .form-row {
                margin-bottom: 14px;
            }
            .form-row label {
                display: block;
                margin-bottom: 4px;
                font-weight: bold;
            }
            .form-row input {
                width: 95%;
                padding: 6px 8px;
                border: 1px solid #777;
            }
            .error-msg {
                color: #b00;
                font-size: 13px;
                min-height: 18px;
            }
            .reg-button {
                padding: 8px 18px;
                margin-right: 8px;
                background: #ddd;
                border: 1px solid #666;
                cursor: pointer;
            }
            #regBtn {
                background: #28a745;
                color: white;
                border: none;
            }
            #regBtn:hover {
                background-color: #218838;
            }

            .footer {
                background-color: dimgray;
                color: white;
                text-align: center;
                padding: 20px;
            }
        </style>
    </head>
    <body>
        <img src="https://github.com/Lttt558/QHE4103-Coursework-Delivery-1/blob/feature-homepage/LOGO.jpg?raw=true" class="logo-img">
        
        <nav>
            <div class="logo"></div>
            <div class="links">
                <a href="Home.html">HOME</a>
                <a href="Search.html">SEARCH</a>
                <a href="AddCar.html">SELL</a>
                <a href="Login.html">LOGIN</a>
                <a href="Register.html">REGISTER</a>
            </div>
        </nav>

        <div class="register-container">
            <div class="register-box">
                <h2>User Registration</h2>
                <form id="regForm">
                    <div class="form-row">
                        <label>Full name</label>
                        <input type="text" id="fullname">
                        <div class="error-msg" id="eName"></div>
                    </div>
                    <div class="form-row">
                        <label>Address</label>
                        <input type="text" id="address">
                        <div class="error-msg" id="eAddr"></div>
                    </div>
                    <div class="form-row">
                        <label>Phone (China)</label>
                        <input type="text" id="phone">
                        <div class="error-msg" id="ePhone"></div>
                    </div>
                    <div class="form-row">
                        <label>Email</label>
                        <input type="text" id="email">
                        <div class="error-msg" id="eEmail"></div>
                    </div>
                    <div class="form-row">
                        <label>Username</label>
                        <input type="text" id="username">
                        <div class="error-msg" id="eUser"></div>
                    </div>
                    <div class="form-row">
                        <label>Password</label>
                        <input type="password" id="password">
                        <div class="error-msg" id="ePass"></div>
                    </div>
                    <div>
                        <button type="submit" id="regBtn" class="reg-button">Register</button>
                        <button type="button" id="clearBtn" class="reg-button">Clear</button>
                    </div>
                </form>
            </div>
        </div>

        <script>
            let nameInp = document.getElementById('fullname');
            let addrInp = document.getElementById('address');
            let phoneInp = document.getElementById('phone');
            let emailInp = document.getElementById('email');
            let userInp = document.getElementById('username');
            let passInp = document.getElementById('password');

            let eName = document.getElementById('eName');
            let eAddr = document.getElementById('eAddr');
            let ePhone = document.getElementById('ePhone');
            let eEmail = document.getElementById('eEmail');
            let eUser = document.getElementById('eUser');
            let ePass = document.getElementById('ePass');

            const nameRe = /^[A-Za-z\s]+$/;
            const addrRe = /^[A-Za-z0-9\s]+$/;
            const phoneRe = /^1[0-9]{10}$/;
            const emailRe = /^[^\s@]+@[^\s@]+\.(cn|com)$/i;
            const userRe = /^[A-Za-z0-9]{6,}$/;

            function checkName() {
                let v = nameInp.value.trim();
                if (v === '') { eName.innerText = 'Required'; return false; }
                if (!nameRe.test(v)) { eName.innerText = 'Only letters and spaces'; return false; }
                eName.innerText = ''; return true;
            }
            function checkAddr() {
                let v = addrInp.value.trim();
                if (v === '') { eAddr.innerText = 'Required'; return false; }
                if (!addrRe.test(v)) { eAddr.innerText = 'Only letters, numbers, spaces'; return false; }
                eAddr.innerText = ''; return true;
            }
            function checkPhone() {
                let v = phoneInp.value.trim();
                if (v === '') { ePhone.innerText = 'Required'; return false; }
                if (!phoneRe.test(v)) { ePhone.innerText = '11 digits starting with 1'; return false; }
                ePhone.innerText = ''; return true;
            }
            function checkEmail() {
                let v = emailInp.value.trim();
                if (v === '') { eEmail.innerText = 'Required'; return false; }
                if (!emailRe.test(v)) { eEmail.innerText = 'Must contain @, end .cn or .com'; return false; }
                eEmail.innerText = ''; return true;
            }
            function checkUser() {
                let v = userInp.value.trim();
                if (v === '') { eUser.innerText = 'Required'; return false; }
                if (!userRe.test(v)) { eUser.innerText = 'At least 6 letters/numbers'; return false; }
                eUser.innerText = ''; return true;
            }
            function checkPass() {
                let v = passInp.value;
                if (v === '') { ePass.innerText = 'Required'; return false; }
                if (!userRe.test(v)) { ePass.innerText = 'At least 6 letters/numbers'; return false; }
                ePass.innerText = ''; return true;
            }
            
            nameInp.oninput = checkName;
            addrInp.oninput = checkAddr;
            phoneInp.oninput = checkPhone;
            emailInp.oninput = checkEmail;
            userInp.oninput = checkUser;
            passInp.oninput = checkPass;

            document.getElementById('regForm').onsubmit = function(e) {
                e.preventDefault();
                let ok = checkName() & checkAddr() & checkPhone() & checkEmail() & checkUser() & checkPass();
                if (ok) {
                    alert('Registered (demo)');
                    this.reset();
                    eName.innerText = eAddr.innerText = ePhone.innerText = eEmail.innerText = eUser.innerText = ePass.innerText = '';
                }
            };
            
            document.getElementById('clearBtn').onclick = function() {
                document.getElementById('regForm').reset();
                eName.innerText = eAddr.innerText = ePhone.innerText = eEmail.innerText = eUser.innerText = ePass.innerText = '';
            };
        </script>

        <div class="footer">
            © 2026 CarNext Car Trading System | All Rights Reserved
        </div>
    </body>
</html>
